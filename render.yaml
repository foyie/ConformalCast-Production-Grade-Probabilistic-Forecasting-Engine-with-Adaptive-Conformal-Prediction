services:
  - type: web
    name: conformalcast-forecasting-engine
    env: python
    plan: free
    repo: https://github.com/foyie/ConformalCast-Probabilistic-Forecasting-Engine-with-Adaptive-Conformal-Prediction
    branch: main

    buildCommand: pip install --upgrade pip && pip install -r requirements.txt

    startCommand: gunicorn -w 1 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT src.serving.api:app

    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11.9
