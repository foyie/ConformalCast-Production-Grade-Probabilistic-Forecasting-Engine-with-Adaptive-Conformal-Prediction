services:
  - type: web
    name: prob-forecasting-engine
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 -b 0.0.0.0:$PORT "src.serving.api:app"
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PORT
        value: 10000
